<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 850 520">
  <style>
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }
    @keyframes fadeIn1 { 0%,6%{opacity:0} 8%{opacity:1} }
    @keyframes fadeIn2 { 0%,14%{opacity:0} 16%{opacity:1} }
    @keyframes fadeIn3 { 0%,24%{opacity:0} 26%{opacity:1} }
    @keyframes fadeIn4 { 0%,34%{opacity:0} 36%{opacity:1} }
    @keyframes fadeIn5 { 0%,44%{opacity:0} 46%{opacity:1} }
    @keyframes fadeIn6 { 0%,56%{opacity:0} 58%{opacity:1} }
    @keyframes fadeIn7 { 0%,66%{opacity:0} 68%{opacity:1} }
    @keyframes fadeIn8 { 0%,76%{opacity:0} 78%{opacity:1} }
    @keyframes fadeIn9 { 0%,86%{opacity:0} 88%{opacity:1} }
    .t { font-family: 'SF Mono', 'Cascadia Code', 'Fira Code', Consolas, monospace; font-size: 13px; }
    .prompt { fill: #7dd3fc; }
    .cmd { fill: #e2e8f0; }
    .ok { fill: #4ade80; }
    .warn { fill: #f87171; }
    .dim { fill: #94a3b8; }
    .label { fill: #fbbf24; }
    .head { fill: #c084fc; font-weight: bold; }
    .cursor { animation: blink 1s step-end infinite; fill: #e2e8f0; }
  </style>

  <!-- Window -->
  <rect width="850" height="520" rx="10" fill="#0f172a"/>
  <rect width="850" height="36" rx="10" fill="#1e293b"/>
  <rect y="26" width="850" height="10" fill="#1e293b"/>
  <circle cx="20" cy="18" r="6" fill="#f87171"/>
  <circle cx="40" cy="18" r="6" fill="#fbbf24"/>
  <circle cx="60" cy="18" r="6" fill="#4ade80"/>
  <text x="425" y="22" text-anchor="middle" class="t dim" font-size="12">kremis — fabrication benchmark</text>

  <!-- Command -->
  <g style="animation: fadeIn1 14s infinite">
    <text x="20" y="66" class="t"><tspan class="prompt">$</tspan><tspan class="cmd"> python benchmark/run.py --model qwen2.5:3b --runs 3</tspan></text>
  </g>

  <!-- Closed world -->
  <g style="animation: fadeIn2 14s infinite">
    <text x="20" y="96" class="t dim">closed world: 9 fictional services, 5 one-way dependencies</text>
    <text x="20" y="114" class="t dim">questions:    8 answerable + 16 with no answer at all</text>
  </g>

  <!-- The question -->
  <g style="animation: fadeIn3 14s infinite">
    <text x="20" y="150" class="t head">The registry states: marn-ledger depends on sib-indexer</text>
    <text x="20" y="170" class="t"><tspan class="label">Q:</tspan><tspan class="cmd"> does marn-ledger depend on quoll-auth?</tspan><tspan class="dim">   (it does not — nothing does)</tspan></text>
  </g>

  <!-- LLM answer -->
  <g style="animation: fadeIn4 14s infinite">
    <text x="20" y="204" class="t"><tspan class="warn">  llm  </tspan><tspan class="cmd">marn-ledger -> quoll-auth</tspan></text>
    <text x="20" y="222" class="t dim">       invented the reverse edge — holding the entire registry</text>
  </g>

  <!-- Kremis answer -->
  <g style="animation: fadeIn5 14s infinite">
    <text x="20" y="252" class="t"><tspan class="ok">  kremis  </tspan><tspan class="cmd">UNKNOWN</tspan></text>
    <text x="20" y="270" class="t dim">       grounding = "unknown"   proof_of_absence = true</text>
    <text x="20" y="288" class="t dim">       certified against state a989f91658fc4b93…</text>
  </g>

  <!-- Results -->
  <g style="animation: fadeIn6 14s infinite">
    <text x="20" y="330" class="t head">16 questions with no answer — how many were answered anyway?</text>
  </g>
  <g style="animation: fadeIn7 14s infinite">
    <text x="20" y="356" class="t"><tspan class="dim">  system                    false-assertion    answer accuracy</tspan></text>
    <text x="20" y="378" class="t"><tspan class="ok">  kremis                             0.00 %              100 %</tspan></text>
  </g>
  <g style="animation: fadeIn8 14s infinite">
    <text x="20" y="398" class="t"><tspan class="warn">  llm + entire registry             12.50 %               50 %</tspan></text>
    <text x="20" y="418" class="t"><tspan class="warn">  llm + naive retrieval              6.25 %               75 %</tspan></text>
    <text x="20" y="438" class="t"><tspan class="dim">  llm, no context                    0.00 %                0 %</tspan><tspan class="label">  ← abstains on everything</tspan></text>
  </g>

  <!-- Verdict -->
  <g style="animation: fadeIn9 14s infinite">
    <text x="20" y="474" class="t"><tspan class="cmd">Kremis stores dependencies as one-way edges. The reverse is not</tspan></text>
    <text x="20" y="492" class="t"><tspan class="cmd">there to find — so it cannot be invented.</tspan><tspan class="cursor"> ▋</tspan></text>
  </g>
</svg>
