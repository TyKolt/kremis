[changelog]
header = """
# Changelog

All notable changes to Kremis are documented in this file.

"""
body = """
{% if version %}\
## [{{ version | trim_start_matches(pat="v") }}] - {{ timestamp | date(format="%Y-%m-%d") }}
{% else %}\
## [Unreleased]
{% endif %}\
{% for group, commits in commits | group_by(attribute="group") %}
### {{ group | striptags | trim | upper_first }}
{% for commit in commits %}
- {% if commit.scope %}*({{ commit.scope }})* {% endif %}\
{% if commit.breaking %}[**breaking**] {% endif %}\
{{ commit.message | upper_first }}\
{% if commit.id %} ([`{{ commit.id | truncate(length=7, end="") }}`](https://github.com/TyKolt/kremis/commit/{{ commit.id }})){% endif %}\
{% endfor %}
{% endfor %}\n
"""
footer = """
---
*Generated by [git-cliff](https://git-cliff.org)*
"""
trim = true

[git]
conventional_commits = true
filter_unconventional = false
split_commits = false
# Prevent breaking commits from being excluded by commit parsers.
protect_breaking_commits = true
# Preprocessors: enrich issue references before parsing.
commit_preprocessors = [
  { pattern = '\((\w+\s)?#([0-9]+)\)', replace = "([#${2}](https://github.com/TyKolt/kremis/issues/${2}))" },
]
# Parsers evaluated in order — first match wins.
# Noise commits are filtered first, then user-relevant types are grouped.
commit_parsers = [
  # --- Noise filters (skip) ---
  { message = "^docs: [Rr]egenerate CHANGELOG", skip = true },
  { message = "\\[skip ci\\]", skip = true },
  { message = "^Merge", skip = true },
  { message = "^ci", skip = true },
  { message = "^style", skip = true },
  { message = "^test", skip = true },
  { message = "^bench", skip = true },
  { message = "^build", skip = true },
  { message = "^chore\\(release\\)", skip = true },
  # --- User-visible groups (sorted by HTML comment prefix) ---
  { message = "^feat", group = "<!-- 0 -->Features" },
  { message = "^fix", group = "<!-- 1 -->Bug Fixes" },
  { message = "^refactor", group = "<!-- 2 -->Refactoring" },
  { message = "^perf", group = "<!-- 3 -->Performance" },
  { message = "^docs", group = "<!-- 4 -->Documentation" },
  { message = "^deps", group = "<!-- 5 -->Dependencies" },
  { body = ".*security", group = "<!-- 6 -->Security" },
  { message = "^revert", group = "<!-- 7 -->Reverted" },
  { message = "^chore", group = "<!-- 8 -->Miscellaneous" },
]
# Only commits matching a non-skip group above are included.
filter_commits = true
tag_pattern = "v[0-9]*"
skip_tags = ""
ignore_tags = ""
topo_order = false
sort_commits = "oldest"
link_parsers = [
  { pattern = "#(\\d+)", href = "https://github.com/TyKolt/kremis/issues/$1" },
]
