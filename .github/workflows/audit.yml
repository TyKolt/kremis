name: Security Audit

# Per la raccomandazione RustSec, l'audit gira solo quando le dipendenze
# cambiano (paths su Cargo.toml/Cargo.lock) piu' un controllo giornaliero
# che intercetta nuove advisory pubblicate contro dipendenze gia' presenti.
# In questo modo non si paga la compilazione di cargo-audit (~3m) su ogni
# commit code-only, senza perdere copertura di sicurezza.
on:
  push:
    branches: [main]
    paths:
      - "**/Cargo.toml"
      - "**/Cargo.lock"
  pull_request:
    branches: [main]
    paths:
      - "**/Cargo.toml"
      - "**/Cargo.lock"
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  audit:
    name: Security Audit
    runs-on: ubuntu-latest
    permissions:
      checks: write
      contents: read
      issues: write
    steps:
      - uses: actions/checkout@v7
      - uses: rustsec/audit-check@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          # Permanent Exemption (vedi .claude/generated/project-facts.md):
          # RUSTSEC-2023-0089 atomic-polyfill unmaintained -- transitivo via
          # postcard 1.1.x -> heapless 0.7 -> atomic-polyfill. Non sfruttabile
          # (unmaintained, non vuln); risolvibile solo con postcard 2.0 (non
          # rilasciato). Senza questo ignore l'action ricrea l'issue ogni giorno.
          ignore: RUSTSEC-2023-0089
