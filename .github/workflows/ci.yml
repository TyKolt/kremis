name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  CARGO_INCREMENTAL: 0

permissions:
  contents: read

jobs:
  fmt:
    name: Rustfmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
        with:
          key: clippy
      - run: cargo clippy --all-targets --all-features -- -D warnings

  test:
    name: Tests (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
      # Windows-only: the default MSVC linker (link.exe) is single-threaded and
      # dominates the per-test-binary link time. lld-link (LLVM, preinstalled on
      # the GitHub Windows image) links in parallel. Stable-toolchain mechanism
      # via -C linker, scoped to this CI job only (debug, no LTO) so release
      # builds and local Windows dev keep the default linker. Set before
      # rust-cache so the flag is folded into the Windows cache key.
      - name: Use lld-link on Windows
        if: matrix.os == 'windows-latest'
        shell: bash
        run: echo "RUSTFLAGS=-C linker=lld-link.exe" >> "$GITHUB_ENV"
      - uses: Swatinem/rust-cache@v2
        with:
          key: test
      - run: cargo build --workspace
      - run: cargo test --workspace
      - run: cargo test --doc --workspace

  openapi:
    name: OpenAPI Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: "lts/*"
          cache: "npm"
          cache-dependency-path: ".github/workflows/ci.yml"
      - run: npx --yes @redocly/cli@2 lint docs/openapi.yml --skip-rule=no-server-example.com

  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          key: build
      - run: cargo build --workspace --release

  bench-compile:
    name: Bench Compile
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          key: bench
      - run: cargo bench --workspace --no-run

  ci-success:
    name: CI Success
    runs-on: ubuntu-latest
    needs: [fmt, clippy, test, openapi, build, bench-compile]
    if: always()
    steps:
      - name: Check all jobs passed
        run: |
          if [[ "${{ needs.fmt.result }}" != "success" ]] || \
             [[ "${{ needs.clippy.result }}" != "success" ]] || \
             [[ "${{ needs.test.result }}" != "success" ]] || \
             [[ "${{ needs.openapi.result }}" != "success" ]] || \
             [[ "${{ needs.build.result }}" != "success" ]] || \
             [[ "${{ needs.bench-compile.result }}" != "success" ]]; then
            echo "One or more required jobs failed"
            exit 1
          fi
          echo "All required CI checks passed!"
