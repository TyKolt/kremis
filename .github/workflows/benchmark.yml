name: Benchmark

on:
  push:
    branches: [main]

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  benchmark:
    name: Bench (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable

      - uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ matrix.os }}-cargo-bench-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ matrix.os }}-cargo-bench-

      - name: Run benchmarks
        run: cargo bench -p kremis-core --bench graph_bench -- --output-format bencher | tee bench-output.txt

      - name: Upload results
        uses: actions/upload-artifact@v7
        with:
          name: bench-${{ matrix.os }}
          path: bench-output.txt

  update-readme:
    name: Update README
    needs: benchmark
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Download all benchmark results
        uses: actions/download-artifact@v8
        with:
          path: bench-results

      - name: Update README benchmarks
        run: |
          python3 << 'SCRIPT'
          import re, os, sys
          from datetime import datetime, timezone

          BENCHMARKS = [
              ("node_insertion/100000", "Node insertion (100K)"),
              ("signal_ingestion/sequence/10000", "Signal ingestion (10K batch)"),
              ("traverse/depth_50/1000", "Graph traversal (depth 50, 1K nodes)"),
              ("strongest_path/1000", "Strongest path (1K nodes)"),
              ("export_canonical/1000", "Canonical export (1K nodes)"),
              ("import_canonical/10000", "Canonical import (10K nodes)"),
              ("redb_operations/insert_nodes/1000", "Redb node insertion (1K)"),
          ]

          OS_LABELS = {
              "ubuntu-latest": "Linux",
              "windows-latest": "Windows",
              "macos-latest": "macOS",
          }

          OS_ORDER = ["ubuntu-latest", "windows-latest", "macos-latest"]

          def format_ns(ns):
              if ns >= 1_000_000_000:
                  return f"{ns / 1_000_000_000:.1f} s"
              if ns >= 1_000_000:
                  return f"{ns / 1_000_000:.2f} ms"
              if ns >= 1_000:
                  return f"{ns / 1_000:.1f} \u00b5s"
              return f"{ns} ns"

          def parse_bench(path):
              results = {}
              with open(path) as f:
                  for line in f:
                      m = re.match(r"test (.+?)\s+\.\.\. bench:\s+([\d,]+) ns/iter", line)
                      if m:
                          results[m.group(1)] = int(m.group(2).replace(",", ""))
              return results

          # Parse results per OS
          all_results = {}
          for os_name in OS_ORDER:
              path = os.path.join("bench-results", f"bench-{os_name}", "bench-output.txt")
              if os.path.exists(path):
                  all_results[os_name] = parse_bench(path)

          if not all_results:
              print("No benchmark results found", file=sys.stderr)
              sys.exit(1)

          date = datetime.now(timezone.utc).strftime("%Y-%m-%d")
          os_present = [o for o in OS_ORDER if o in all_results]
          os_headers = " | ".join(OS_LABELS[o] for o in os_present)

          header = f"| Operation | {os_headers} |"
          separator = "|-----------|" + "|".join("------:" for _ in os_present) + "|"

          rows = []
          for name, display in BENCHMARKS:
              values = []
              has_any = False
              for o in os_present:
                  ns = all_results[o].get(name)
                  if ns is not None:
                      values.append(format_ns(ns))
                      has_any = True
                  else:
                      values.append("\u2014")
              if has_any:
                  rows.append(f"| {display} | {' | '.join(values)} |")

          if not rows:
              print("No matching benchmark results found", file=sys.stderr)
              sys.exit(1)

          table = "\n".join([
              "## Benchmarks",
              "",
              f"> Auto-generated on CI runners \u2014 {date}.",
              "",
              header,
              separator,
          ] + rows)

          section = f"<!-- BENCHMARK-START -->\n{table}\n<!-- BENCHMARK-END -->"

          with open("README.md") as f:
              readme = f.read()

          readme = re.sub(
              r"<!-- BENCHMARK-START -->.*?<!-- BENCHMARK-END -->",
              section,
              readme,
              flags=re.DOTALL,
          )

          with open("README.md", "w") as f:
              f.write(readme)

          print(f"Updated {len(rows)} benchmark entries across {len(os_present)} OS")
          SCRIPT

      - name: Commit README update
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md
          git diff --cached --quiet && echo "No changes" && exit 0
          git commit -m "docs: update benchmark results [skip ci]"
          git push
