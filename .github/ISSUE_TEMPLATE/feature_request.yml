name: Feature Request
description: Propose a new feature or improvement
labels: ["enhancement"]
title: "[Feature] "
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting an improvement. Please describe the problem you're trying to solve and, if possible, how you'd like it to work.

  - type: checkboxes
    id: existing_issues
    attributes:
      label: Pre-submission checklist
      options:
        - label: I have searched [existing issues](https://github.com/TyKolt/kremis/issues) and [discussions](https://github.com/TyKolt/kremis/discussions) and this has not been requested before.
          required: true

  - type: dropdown
    id: component
    attributes:
      label: Component
      description: Which part of the project does this feature relate to?
      options:
        - kremis-core (graph engine)
        - CLI / HTTP server (apps/kremis)
        - MCP server (apps/kremis-mcp)
        - Documentation
        - Other
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: Problem statement
      description: What are you trying to do that is currently difficult or impossible?
      placeholder: "I need to... but currently..."
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: Describe the feature you would like to see, if you have one in mind.

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: What workarounds or alternative approaches have you tried?

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Any other context, examples, or references that may be helpful.
