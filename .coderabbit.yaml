# yaml-language-server: $schema=https://coderabbit.ai/integrations/schema.v2.json
language: "en-US"
early_access: false

reviews:
  profile: "assertive"
  request_changes_workflow: false
  high_level_summary: true
  high_level_summary_in_walkthrough: true
  poem: false
  review_status: true
  review_details: true
  collapse_walkthrough: false
  auto_review:
    enabled: true
    drafts: false
    base_branches:
      - main

  path_filters:
    - "!.claude/**"
    - "!.agents/**"


  path_instructions:
    - path: "crates/kremis-core/**"
      instructions: |
        kremis-core must remain PURE (Separation Law): no async, no network, no I/O.
        Reject any import of tokio, reqwest, std::net, or other async/network crates.

        Flag any use of:
        - unwrap(), expect(), panic!() — clippy::deny in this project
        - f32/f64 arithmetic — float_arithmetic is deny
        - Randomness, timestamps, or non-deterministic logic (Determinism Law)
        - Silent error conversion to None/default without caller visibility (Precision Law)

        For edge mutations (insert_edge, increment_edge): verify that node-existence
        checks are consistent across Graph (in-memory) and RedbGraph (persistent) backends.
        increment_edge must not create edges for non-existent nodes.

        For property storage (store_property): verify that repeated ingestion of the
        same signal does not silently accumulate duplicate (attribute, value) pairs.

    - path: "apps/kremis-mcp/src/**"
      instructions: |
        The MCP bridge must mirror the HTTP API contract exactly.
        When parsing JSON responses, field names must match the actual HTTP response
        structs defined in apps/kremis/src/api/types.rs.

        RetractResponse fields are: `success` (bool), `new_weight` (i64|null), `error` (string|null).
        The fields `retracted`, `from_node`, `to_node` do NOT exist in the HTTP response.

        Flag any JSON field lookup that does not correspond to a field in the matching
        HTTP response type. Missing tests for MCP tool handlers must be flagged.

    - path: "apps/kremis/src/cli/**"
      instructions: |
        Verify that `json_mode: bool` parameters are actually used to produce JSON output.
        Parameters prefixed with `_` (e.g. `_json_mode`) are silently ignored — flag them.
        Serialization errors must NOT be silenced with unwrap_or_default().

    - path: "apps/kremis/src/config.rs"
      instructions: |
        Multi-value environment variables (e.g. KREMIS_CORS_ORIGINS) must be parsed
        as comma-separated values, not wrapped as a single-element Vec.

    - path: "Cargo.toml"
      instructions: |
        Every feat: commit requires a MINOR version bump; every fix: commit requires a
        PATCH bump on line 10 (the workspace version field).
        Verify consistency with: docs/api/overview.mdx, apps/kremis/tests/types_tests.rs,
        docs/openapi.yml.

    - path: "docs/**"
      instructions: |
        CLI flag names must match apps/kremis/src/cli/mod.rs exactly.
        API docs must be consistent with docs/openapi.yml.
        Do not reference private directories: .claude/, _archive/, social/.

  tools:
    clippy:
      enabled: true
    markdownlint:
      enabled: true
    gitleaks:
      enabled: true
    hadolint:
      enabled: true
    yamllint:
      enabled: true
    actionlint:
      enabled: true

knowledge_base:
  learnings:
    scope: "auto"

chat:
  auto_reply: true
